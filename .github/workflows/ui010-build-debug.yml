name: UI010 build debug

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  debug-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Depoyu al
        uses: actions/checkout@v6

      - name: Node.js kur
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          package-manager-cache: false

      - name: Bağımlılıkları kur
        run: npm install --no-audit --no-fund

      - name: Build günlüğünü üret
        shell: bash
        run: |
          npm run build > production-build.log 2>&1 || true
          cat production-build.log

      - name: Build günlüğünü yükle
        uses: actions/upload-artifact@v4
        with:
          name: ui010-production-build-log
          path: production-build.log
          if-no-files-found: error
          retention-days: 2
