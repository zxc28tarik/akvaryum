name: Resif motor tanısı geçici

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          package-manager-cache: false
      - run: npm install --no-audit --no-fund
      - name: Resif motor hatasını kaydet
        shell: bash
        run: |
          set +e
          npm run check:engine-reef > reef-engine-error.log 2>&1
          echo $? > reef-engine-exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: reef-engine-diagnostic
          path: |
            reef-engine-error.log
            reef-engine-exit-code.txt
          if-no-files-found: error
          retention-days: 1
