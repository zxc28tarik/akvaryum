name: Avcı-av hata ayıklama

on:
  pull_request:

permissions:
  contents: read

jobs:
  predation:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Depoyu al
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Node.js kur
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          package-manager-cache: false

      - name: Bağımlılıkları kur
        run: npm install --no-audit --no-fund

      - name: Avcı-av kontrol çıktısını kaydet
        id: predation
        shell: bash
        run: |
          set +e
          npm run check:engine-predation > predation-debug.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Production build çıktısını kaydet
        id: build
        shell: bash
        run: |
          set +e
          npm run build > build-debug.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Hata çıktılarını yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: predation-debug-log
          path: |
            predation-debug.log
            build-debug.log
          if-no-files-found: error
          retention-days: 1

      - name: Kontrol sonucunu uygula
        if: steps.predation.outputs.status != '0' || steps.build.outputs.status != '0'
        run: exit 1
