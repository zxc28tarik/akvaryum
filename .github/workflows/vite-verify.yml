name: Vite doğrulama

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Depoyu al
        uses: actions/checkout@v6

      - name: Node.js kur
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          package-manager-cache: false

      - name: Bağımlılıkları kur
        run: npm install --no-audit --no-fund

      - name: Mevcut veri envanterini doğrula
        id: legacy-check
        shell: bash
        run: |
          set +e
          npm run check:legacy > legacy-check.log 2>&1
          code=$?
          cat legacy-check.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Başarısız envanter logunu sakla
        if: steps.legacy-check.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: legacy-check-log
          path: legacy-check.log

      - name: Envanter hatasında işi durdur
        if: steps.legacy-check.outputs.exit_code != '0'
        run: exit 1

      - name: Ortak veri şemasını doğrula
        run: npm run check:schema

      - name: Canlı sınıflandırmasını doğrula
        run: npm run check:classification

      - name: Kaynak ve doğrulama modelini doğrula
        run: npm run check:sources

      - name: Inhabitant v1 migrasyonunu doğrula
        run: npm run check:migration

      - name: Balık, omurgasız ve mercan kataloglarını doğrula
        run: npm run check:catalog

      - name: Production build al
        run: npm run build

      - name: Native production paketini doğrula
        run: npm run check:native
