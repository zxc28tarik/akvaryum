name: Vite doğrulama

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Depoyu al
        uses: actions/checkout@v6

      - name: Node.js kur
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          package-manager-cache: false

      - name: Bağımlılıkları kur
        run: npm install --no-audit --no-fund

      - name: Mevcut veri envanterini doğrula
        run: npm run check:legacy

      - name: Ortak veri şemasını doğrula
        run: npm run check:schema

      - name: Canlı sınıflandırmasını doğrula
        run: npm run check:classification

      - name: Kaynak ve doğrulama modelini doğrula
        run: npm run check:sources

      - name: Inhabitant v1 migrasyonunu doğrula
        run: npm run check:migration

      - name: Plant v1 migrasyonunu doğrula
        run: npm run check:plants

      - name: Substrate v1 migrasyonunu doğrula
        run: npm run check:substrates

      - name: Motor ortak parametre kesişimini doğrula
        run: npm run check:engine-params

      - name: Motor bulgu sözleşmesini doğrula
        run: npm run check:engine-findings

      - name: Temel 32 altın motor senaryosunu doğrula
        shell: bash
        run: |
          set -o pipefail
          npm run check:engine-golden 2>&1 | tee engine-golden.log

      - name: Başarısız altın test günlüğünü yükle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: engine-golden-failure
          path: engine-golden.log
          if-no-files-found: error
          retention-days: 7

      - name: Kategori ve gelişmiş katalog filtrelerini doğrula
        run: npm run check:catalog-filters

      - name: Canlı ayrıntı panelini doğrula
        run: npm run check:inhabitant-detail

      - name: Mobil ana akış korumasını doğrula
        run: npm run check:mobile-flow

      - name: İlk 100 sosyal yapı ve bakım zorluğunu doğrula
        run: npm run check:priority100

      - name: İlk 100 minimum tank uzunluğunu doğrula
        run: npm run check:tanklength100

      - name: Bilimsel ad ve kimlik tekrarlarını denetle
        run: npm run check:taxonomy

      - name: Balık, omurgasız ve mercan kataloglarını doğrula
        run: npm run check:catalog

      - name: Production build al
        run: npm run build

      - name: Native production paketini doğrula
        run: npm run check:native
