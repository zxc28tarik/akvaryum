name: Vite doğrulama

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Depoyu al
        uses: actions/checkout@v6

      - name: Node.js kur
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          package-manager-cache: false

      - name: Bağımlılıkları kur
        run: npm install --no-audit --no-fund

      - name: Mevcut veriyi doğrula
        run: npm run check:legacy

      - name: Production build al
        run: npm run build
